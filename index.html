<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🏆 Scoreboard Creation 🏆</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>🏆 Scoreboard Creator 🏆</h1>
        <p class="subtitle">Create your own live scoreboard — play, track, and share with friends!</p>

        <!-- Create New Scoreboard -->
        <div class="create-card">
            <h2>✨ Create New Scoreboard</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="sbTitle">Scoreboard Title</label>
                    <input type="text" id="sbTitle" placeholder="e.g. Soccer Finals" maxlength="40" />
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="player1Name">Player 1 Name</label>
                    <input type="text" id="player1Name" placeholder="e.g. Bob" maxlength="20" />
                </div>
                <div class="form-group">
                    <label for="player2Name">Player 2 Name</label>
                    <input type="text" id="player2Name" placeholder="e.g. Jordan" maxlength="20" />
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="sbTheme">Theme / Sport Icon</label>
                    <select id="sbTheme">
                        <option value="⚽">⚽ Soccer</option>
                        <option value="🏓">🏓 Pickleball</option>
                        <option value="🎾">🎾 Squash / Tennis</option>
                        <option value="🏃">🏃 Tag / Running</option>
                        <option value="🏀">🏀 Basketball</option>
                        <option value="🏈">🏈 Football</option>
                        <option value="⚾">⚾ Baseball</option>
                        <option value="🎯">🎯 Darts</option>
                        <option value="🎳">🎳 Bowling</option>
                        <option value="🏐">🏐 Volleyball</option>
                        <option value="🥊">🥊 Boxing</option>
                        <option value="🏊">🏊 Swimming</option>
                        <option value="🚴">🚴 Cycling</option>
                        <option value="🎮">🎮 Video Games</option>
                        <option value="♟️">♟️ Chess</option>
                        <option value="🎲">🎲 Board Games</option>
                    </select>
                </div>
                <div class="form-group" style="display:flex; align-items:flex-end;">
                    <button class="btn btn-primary" onclick="createScoreboard()" style="width:100%;">➕ Create Scoreboard</button>
                </div>
            </div>
        </div>

        <!-- Scoreboard List -->
        <h2 style="margin-bottom:16px; font-size:1.3em; color:#e2e8f0;">📋 Your Scoreboards</h2>
        <div id="scoreboardList" class="scoreboard-list">
            <!-- Populated by JavaScript -->
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
